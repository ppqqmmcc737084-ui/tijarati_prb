name: Build Android APK

on:
  workflow_dispatch: # هذا السطر يسمح لك بتشغيل الاستخراج بضغطة زر يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK to Download
        uses: actions/upload-artifact@v4
        with:
          name: Tijarati-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk