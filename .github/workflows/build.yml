name: Build Flutter APK

on:
  workflow_dispatch: # هذا السطر السحري يخليك تشغل المصنع بضغطة زر من الموقع بدون ما ترفع كود كل شوي

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. تنزيل الكود بأمان تام
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    # 2. إعطاء الصلاحية القصوى للمجلد (هذا اللي بيقتل خطأ 128)
    - name: Fix Git Permissions
      run: git config --global --add safe.directory $GITHUB_WORKSPACE

    # 3. إعداد الجافا
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 4. تحميل فلاتر (نسخة ثابتة ما فيها أخطاء)
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    # 5. تنظيف السيرفر وتحميل المكتبات
    - name: Flutter Clean & Pub Get
      run: |
        flutter clean
        flutter pub get

    # 6. بناء التطبيق
    - name: Build APK
      run: flutter build apk --release

    # 7. رفع التطبيق للتحميل
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Tijarati-Pro-APK
        path: build/app/outputs/flutter-apk/app-release.apk