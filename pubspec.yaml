name: tijarati_prb
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 1. الأساسيات وقاعدة البيانات
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2

  # 2. الخطوط والتصميم
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # 3. الملفات والمشاركة والنسخ الاحتياطي
  file_picker: ^8.0.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5

  # 4. المميزات الجديدة (باركود، طباعة، بصمة، واتساب)
  mobile_scanner: ^5.1.0
  pdf: ^3.11.3
  printing: ^5.14.2
  local_auth: ^2.1.6
  url_launcher: ^6.2.5
  screenshot: ^3.0.0
  shared_preferences: ^2.5.4
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.3.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  archive: ^4.0.9
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  fl_chart: ^0.66.0
  qr_flutter: ^4.1.0
  blue_thermal_printer: ^1.2.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

# ✅ إعدادات الأيقونة الأصلية حقك
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

# ✅ إعدادات الصور والتصميم
flutter:
  uses-material-design: true
  assets:
    - assets/images/